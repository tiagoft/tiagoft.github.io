name: Validate Bibliography

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Render bibliography
        run: python render_bibliography.py

      - name: Fail if index.html was not up to date
        run: |
          if ! git diff --quiet index.html; then
            echo "index.html is out of sync with bibliography.bib — run render_bibliography.py locally before committing."
            git diff index.html
            exit 1
          fi
